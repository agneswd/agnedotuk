<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agneswd</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <header class="site-header">
      <h1 class="site-name">agneswd</h1>
      <p class="site-tagline">design &amp; development</p>
    </header>

    <main>
      <section class="projects-section" aria-label="Projects">
        <div id="project-grid" class="project-grid" role="list">
          <!-- Populated by script.js renderProjects() -->
        </div>
        <p id="loading-state" class="status-line">loading…</p>
        <p id="empty-state"   class="status-line" hidden>no projects yet.</p>
        <p id="error-state"   class="status-line" hidden>couldn't load projects — try refreshing.</p>
      </section>
    </main>

    <footer class="site-footer">
      <span class="footer-line">agneswd &mdash; <time id="footer-year"></time></span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
